# =============================================================================
# Smart Portfolio — CI Pipeline
# =============================================================================
# Runs on every push and pull request to any branch.
#
# Jobs:
#   1. lint    — go vet + staticcheck
#   2. test    — unit tests with coverage
#   3. build   — compile binary + Docker image
# =============================================================================

name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read

env:
  GO_VERSION: "1.26"

defaults:
  run:
    working-directory: backend

jobs:
  # ---------------------------------------------------------------------------
  # Lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Verify dependencies
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum || {
            echo "::error::go.mod or go.sum is not tidy. Run 'go mod tidy' and commit."
            exit 1
          }

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::The following files are not formatted:"
            echo "$unformatted"
            echo ""
            echo "Run 'go fmt ./...' and commit."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Test
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run tests with coverage
        run: |
          go test ./... \
            -count=1 \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.out
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Build
  # ---------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Build binary (linux/amd64)
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w" \
            -o bin/smart-portfolio \
            ./cmd/server

      - name: Verify binary was created
        run: |
          ls -lh bin/smart-portfolio
          file bin/smart-portfolio

      - name: Build Docker image
        run: docker build -t smart-portfolio:ci .

      - name: Verify Docker image health
        run: |
          echo "Image size:"
          docker images smart-portfolio:ci --format "{{.Size}}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-binary-linux-amd64
          path: backend/bin/smart-portfolio
          retention-days: 7
