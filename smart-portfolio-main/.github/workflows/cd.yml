# =============================================================================
# Smart Portfolio — CD Pipeline
# =============================================================================
# Triggers on version tags (v*) pushed to main.
#
# Jobs:
#   1. test     — run full test suite before deploying anything
#   2. release  — build multi-platform Docker image, push to GHCR, create GitHub Release
# =============================================================================

name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  GO_VERSION: "1.26"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/smart-portfolio

defaults:
  run:
    working-directory: backend

jobs:
  # ---------------------------------------------------------------------------
  # Test — gate: nothing ships if tests fail
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run tests
        run: go test ./... -count=1 -race

  # ---------------------------------------------------------------------------
  # Release — Docker image to GHCR + GitHub Release with binary
  # ---------------------------------------------------------------------------
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      # ── Extract version from tag ──────────────────────────────────────
      - name: Extract version metadata
        id: meta
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $TAG ($VERSION)"

      # ── Build static binaries ─────────────────────────────────────────
      - name: Build linux/amd64 binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.version }}" \
            -o dist/smart-portfolio-linux-amd64 \
            ./cmd/server

      - name: Build linux/arm64 binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.version }}" \
            -o dist/smart-portfolio-linux-arm64 \
            ./cmd/server

      - name: Build darwin/arm64 binary (macOS Apple Silicon)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.version }}" \
            -o dist/smart-portfolio-darwin-arm64 \
            ./cmd/server

      - name: Build darwin/amd64 binary (macOS Intel)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.version }}" \
            -o dist/smart-portfolio-darwin-amd64 \
            ./cmd/server

      - name: Build windows/amd64 binary
        run: |
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build \
            -trimpath \
            -ldflags="-s -w -X main.version=${{ steps.meta.outputs.version }}" \
            -o dist/smart-portfolio-windows-amd64.exe \
            ./cmd/server

      - name: List built binaries
        run: ls -lh dist/

      # ── Docker: set up buildx for multi-platform builds ───────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v4

      # ── Docker: authenticate to GHCR ──────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Docker: generate image tags and labels ────────────────────────
      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Smart Portfolio
            org.opencontainers.image.description=Portfolio backend with AI chat, payments, and admin dashboard
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      # ── Docker: build and push multi-platform image ───────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      # ── GitHub Release with binaries ──────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.meta.outputs.tag, '-rc') || contains(steps.meta.outputs.tag, '-beta') || contains(steps.meta.outputs.tag, '-alpha') }}
          files: |
            backend/dist/smart-portfolio-linux-amd64
            backend/dist/smart-portfolio-linux-arm64
            backend/dist/smart-portfolio-darwin-arm64
            backend/dist/smart-portfolio-darwin-amd64
            backend/dist/smart-portfolio-windows-amd64.exe
          body: |
            ## Docker Image

            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ```

            ## Binaries

            | Platform | Binary |
            |----------|--------|
            | Linux amd64 | `smart-portfolio-linux-amd64` |
            | Linux arm64 | `smart-portfolio-linux-arm64` |
            | macOS Apple Silicon | `smart-portfolio-darwin-arm64` |
            | macOS Intel | `smart-portfolio-darwin-amd64` |
            | Windows amd64 | `smart-portfolio-windows-amd64.exe` |
