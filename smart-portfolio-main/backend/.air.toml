# =============================================================================
# Smart Portfolio — Air Live Reload Configuration
# =============================================================================
# Usage:
#   go install github.com/air-verse/air@latest
#   air
#
# Or via Makefile:
#   make dev
# =============================================================================

root = "."
tmp_dir = "tmp"

[build]
  # Build command
  cmd = "go build -o ./tmp/server ./cmd/server"

  # Binary to run after build
  bin = "./tmp/server"

  # Watch these file extensions for changes
  include_ext = ["go", "sql", "toml"]

  # Exclude these directories from watching
  exclude_dir = ["tmp", "bin", "out", "build", "dist", "vendor", "coverage", "node_modules", ".git", ".idea", ".vscode"]

  # Exclude these files from watching
  exclude_file = []

  # Exclude files matching these regex patterns
  exclude_regex = ["_test\\.go$", ".*_templ\\.go$"]

  # Exclude unchanged files
  exclude_unchanged = false

  # Follow symlinks
  follow_symlink = false

  # Working directory (relative to root)
  full_bin = ""

  # Delay before rebuilding after a file change (in milliseconds)
  delay = 500

  # Stop running old binary when build errors occur
  stop_on_error = true

  # Send SIGINT instead of SIGKILL for graceful shutdown
  send_interrupt = true

  # Delay after sending interrupt before force-killing (in milliseconds)
  kill_delay = 3000

  # Rerun binary even if the binary hasn't changed (useful if .env changed)
  rerun = false

  # Rerun delay (in milliseconds)
  rerun_delay = 500

  # Arguments passed to the binary
  args_bin = []

  # Log the build time
  log = "build-errors.log"

[log]
  # Show log time
  time = false

  # Only show main log (not watcher/build details)
  main_only = false

[color]
  # Customize colors for different log types
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp directory on exit
  clean_on_exit = true

[screen]
  # Clear screen on rebuild
  clear_on_rebuild = true

  # Keep scroll position
  keep_scroll = true
